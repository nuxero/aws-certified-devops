AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lambda safe deployment with SAM DeploymentPreference
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
Resources:
  MyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sam-deploy-lab-function
      Handler: src/app.handler
      AutoPublishAlias: live
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
        - Ref: FunctionErrorsAlarm
        Hooks:
          PreTraffic:
            Ref: PreTrafficHook
      CodeUri: MyFunction
    Metadata:
      SamResourceId: MyFunction
  PreTrafficHook:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CodeDeployHook_sam-deploy-lab-pretraffic
      Handler: src/pretraffic.handler
      Policies:
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - codedeploy:PutLifecycleEventHookExecutionStatus
          Resource: '*'
        - Effect: Allow
          Action:
          - lambda:InvokeFunction
          Resource:
            Fn::Sub: ${MyFunction.Arn}:*
      Environment:
        Variables:
          TARGET_FUNCTION:
            Ref: MyFunction
          TARGET_ALIAS: live
      CodeUri: PreTrafficHook
    Metadata:
      SamResourceId: PreTrafficHook
  FunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-deploy-lab-errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
      - Name: FunctionName
        Value:
          Ref: MyFunction
      - Name: Resource
        Value:
          Fn::Sub: ${MyFunction}:live
