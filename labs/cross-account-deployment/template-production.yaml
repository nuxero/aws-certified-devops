AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cross-Account Pipeline Lab - Production Account (Account B)'

Parameters:
  ToolingAccountId:
    Type: String
    Description: 'The AWS Account ID of the tooling account (Account A)'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC to deploy the ECS service into'
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: 'Subnets for the ECS tasks (must have internet access)'

Resources:
  # --- Security Group ---
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Allow inbound HTTP on port 3000'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  # --- ECS Task Execution Role ---
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossAccountLab-ECSTaskExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: CrossAccountECRPull
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${ToolingAccountId}:repository/cross-account-app'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'

  # --- ECS Cluster ---
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: cross-account-prod-cluster

  # --- Task Definition ---
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: cross-account-app-task
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: cross-account-app-container
          Image: !Sub '${ToolingAccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/cross-account-app:latest'
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp

  # --- ECS Service ---
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: cross-account-app-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 0
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets: !Ref SubnetIds

Outputs:
  ECSClusterName:
    Value: !Ref ECSCluster
  ECSServiceName:
    Value: !GetAtt ECSService.Name
  TaskExecutionRoleArn:
    Value: !GetAtt ECSTaskExecutionRole.Arn
  SecurityGroupId:
    Value: !Ref ECSSecurityGroup