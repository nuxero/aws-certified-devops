AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cross-Account Pipeline Lab - Tooling Account (Account A)'

Parameters:
  ProductionAccountId:
    Type: String
    Description: 'The AWS Account ID of the production account (Account B)'

Resources:
  # --- KMS Key for artifact encryption ---
  PipelineKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: 'KMS key for cross-account pipeline artifact encryption'
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableToolingAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowProductionAccountDecrypt
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ProductionAccountId}:root'
            Action:
              - kms:Decrypt
              - kms:DescribeKey
            Resource: '*'

  PipelineKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/cross-account-pipeline-key
      TargetKeyId: !Ref PipelineKMSKey

  # --- S3 Artifact Bucket ---
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'cross-account-pipeline-artifacts-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !GetAtt PipelineKMSKey.Arn
            BucketKeyEnabled: true

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowProductionAccountRead
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ProductionAccountId}:root'
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
            Resource: !Sub '${ArtifactBucket.Arn}/*'
          - Sid: AllowProductionAccountList
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ProductionAccountId}:root'
            Action:
              - s3:GetBucketVersioning
              - s3:ListBucket
            Resource: !GetAtt ArtifactBucket.Arn

  # --- ECR Repository ---
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: cross-account-app
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowProductionAccountPull
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ProductionAccountId}:root'
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability

  # --- CodeCommit Repository ---
  CodeCommitRepo:
    Type: AWS::CodeCommit::Repository
    Properties:
      RepositoryName: cross-account-app
      RepositoryDescription: 'Sample app for cross-account deployment lab'

  # --- CodeBuild IAM Role ---
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossAccountLab-CodeBuildRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                Resource: !Sub '${ArtifactBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !GetAtt ECRRepository.Arn
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt PipelineKMSKey.Arn
              - Effect: Allow
                Action:
                  - codecommit:GitPull
                Resource: !GetAtt CodeCommitRepo.Arn

  # --- CodeBuild Project ---
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: cross-account-app-build
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: ECR_REPO_URI
            Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/cross-account-app'

  # --- CodePipeline IAM Role ---
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossAccountLab-CodePipelineRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelineAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                  - s3:ListBucket
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub '${ArtifactBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - codecommit:GetBranch
                  - codecommit:GetCommit
                  - codecommit:UploadArchive
                  - codecommit:GetUploadArchiveStatus
                Resource: !GetAtt CodeCommitRepo.Arn
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt PipelineKMSKey.Arn
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: !Sub 'arn:aws:iam::${ProductionAccountId}:role/CrossAccountPipelineRole'

  # --- CodePipeline (Source + Build only) ---
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: cross-account-app-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
        EncryptionKey:
          Id: !GetAtt PipelineKMSKey.Arn
          Type: KMS
      Stages:
        - Name: Source
          Actions:
            - Name: CodeCommitSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: '1'
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                RepositoryName: cross-account-app
                BranchName: main
                PollForSourceChanges: 'false'
        - Name: Build
          Actions:
            - Name: DockerBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref CodeBuildProject

  # --- EventBridge Rule to trigger pipeline on CodeCommit push ---
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossAccountLab-EventBridgeRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipeline
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub 'arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}'

  CodeCommitPushRule:
    Type: AWS::Events::Rule
    Properties:
      Name: cross-account-app-pipeline-trigger
      EventPattern:
        source:
          - aws.codecommit
        detail-type:
          - CodeCommit Repository State Change
        resources:
          - !GetAtt CodeCommitRepo.Arn
        detail:
          event:
            - referenceCreated
            - referenceUpdated
          referenceType:
            - branch
          referenceName:
            - main
      Targets:
        - Id: CodePipelineTarget
          Arn: !Sub 'arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}'
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
  ECRRepositoryUri:
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/cross-account-app'
  KMSKeyArn:
    Value: !GetAtt PipelineKMSKey.Arn
  CodePipelineRoleArn:
    Value: !GetAtt CodePipelineRole.Arn
  CodeCommitCloneUrl:
    Value: !GetAtt CodeCommitRepo.CloneUrlHttp