version: 0.0
os: linux

# Files to copy from the revision bundle to the instance
files:
  - source: /html/index.html
    destination: /usr/share/nginx/html/

# Lifecycle hooks — scripts that run at each deployment event
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 120
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 120
      runas: root
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: root